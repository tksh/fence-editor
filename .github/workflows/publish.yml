name: Publish to JSR

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
      - run: deno publish --set-version ${GITHUB_REF_NAME#v}
